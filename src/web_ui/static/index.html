<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Drone System Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" crossorigin />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>Drone System Dashboard</h1>
    <nav>
      <button class="tab-btn active" data-tab="orders">🛰️ Orders</button>
      <button class="tab-btn" data-tab="settings">⚙️ Settings</button>
      <button class="tab-btn" data-tab="fleet">🚁 Fleet</button>
    </nav>
  </header>

  <main>
    <!-- Orders -->
    <section id="orders" class="tab active">
      <div id="orders-panel">
        <h2>Создать заказ</h2>
        <form id="orderForm">
          <label>Пункт A (забрать):</label><br />
          <input id="from-lat" placeholder="lat" type="number" step="0.000001" />
          <input id="from-lon" placeholder="lon" type="number" step="0.000001" /><br />

          <label>Пункт B (доставить):</label><br />
          <input id="to-lat" placeholder="lat" type="number" step="0.000001" />
          <input id="to-lon" placeholder="lon" type="number" step="0.000001" /><br />

          <label>Дрон:</label>
          <select id="droneSelect"></select><br />

          <label>Вес груза (кг):</label>
          <input id="orderWeight" type="number" value="5" step="0.1" /><br />

          <button type="submit">Создать заказ</button>
        </form>

        <h3>Активные заказы</h3>
        <ul id="orders-list"></ul>

        <h3>Активные полёты</h3>
        <table id="missions-table">
          <thead>
            <tr>
              <th>Миссия</th>
              <th>Дрон</th>
              <th>Статус</th>
              <th>Progress</th>
              <th>Позиция</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div id="map"></div>
    </section>

    <!-- Settings -->
    <section id="settings" class="tab">
      <div id="settings-panel">
        <h2>Настройки</h2>
        <label>Координаты базы:</label><br />
        <input id="base-lat" placeholder="lat" type="number" step="0.000001" />
        <input id="base-lon" placeholder="lon" type="number" step="0.000001" /><br />
        <button id="reload-base">Обновить базу</button>
      </div>
    </section>

    <!-- Fleet -->
    <section id="fleet" class="tab">
      <div id="fleet-panel">
        <h2>Флот дронов</h2>
        <table id="fleet-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Статус</th>
              <th>Координаты</th>
              <th>Высота</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js" crossorigin></script>
  <script src="/static/app.js"></script>
</body>
</html>
